dataset:
  path: data/german.data
  format: delimited
  sep: '\s+'
  header: false
  schema_path: config/schemas/german_credit_schema.json
  source: uci_german_credit

label_col: credit_risk
positive_label: good

label_map:
  "1": good
  "2": bad

sensitive_cols:
  - sex
  - age_group

derived_columns:
  sex:
    type: map
    source: personal_status_sex
    mapping:
      A91: male
      A92: female
      A93: male
      A94: male
      A95: female

  age_group:
    type: bin
    source: age
    bins: [0, 25, 40, 60, 120]
    labels: [young, adult, middle, senior]

min_group_size: 30
fairness_threshold: 0.05

test_size: 0.25
random_state: 42

model:
  type: logistic_regression
  max_iter: 2000